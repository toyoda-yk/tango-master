const STORAGE_KEY = 'joho1_term_master_weak_ids_v2';
class TermMaster {
  constructor() {
    this.el = document.getElementById('app');
    this.view = 'home';
    this.query = '';
    this.category = 'すべて';
    this.sort = 'rate';
    this.quizType = 'descToTerm';
    this.quizSource = 'all';
    this.questions = [];
    this.currentIndex = 0;
    this.score = 0;
    this.isAnswered = false;
    this.selectedOption = null;
    this.history = [];
    this.weakIds = new Set(this.loadWeakIds());
    this.render();
  }
  loadWeakIds() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; } }
  saveWeakIds() { localStorage.setItem(STORAGE_KEY, JSON.stringify([...this.weakIds])); }
  get categories() {
    const map = new Map(); TERMS.forEach(t => map.set(t.category, (map.get(t.category)||0)+1));
    return [...map.entries()].sort((a,b)=> b[1]-a[1] || a[0].localeCompare(b[0],'ja'));
  }
  get filteredTerms() {
    let list = TERMS.filter(t => this.category === 'すべて' || t.category === this.category);
    const q = this.query.trim().toLowerCase();
    if(q) list = list.filter(t => `${t.term} ${t.category} ${t.desc} ${t.code}`.toLowerCase().includes(q));
    if(this.sort === 'rate') list.sort((a,b)=> b.rate-a.rate || a.term.localeCompare(b.term,'ja'));
    if(this.sort === 'term') list.sort((a,b)=> a.term.localeCompare(b.term,'ja'));
    if(this.sort === 'category') list.sort((a,b)=> a.category.localeCompare(b.category,'ja') || b.rate-a.rate);
    return list;
  }
  get weakTerms() { return TERMS.filter(t => this.weakIds.has(t.id)); }
  render() {
    this.el.innerHTML = `<div class="h-full flex flex-col">${this.header()}<main class="flex-1 min-h-0 overflow-hidden">${this.view==='home'?this.home():''}${this.view==='list'?this.listView():''}${this.view==='quizSetup'?this.quizSetupView():''}${this.view==='quiz'?this.quizView():''}${this.view==='result'?this.resultView():''}${this.view==='weak'?this.weakView():''}</main></div>`;
    this.attachEvents();
  }
  header() {
    const nav = [['home','ホーム','fa-house'], ['list','重要語句一覧','fa-table-list'], ['quizSetup','クイズ','fa-circle-question'], ['weak','苦手チェック','fa-bookmark']];
    return `<header class="px-4 md:px-6 pt-4 pb-3 border-b border-slate-800/80 bg-slate-950/70 backdrop-blur-xl"><div class="max-w-6xl mx-auto flex flex-col md:flex-row gap-3 md:items-center md:justify-between"><button data-view="home" class="text-left group"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg shadow-cyan-900/40 group-hover:scale-105 transition"><i class="fa-solid fa-book-open"></i></div><div><h1 class="font-black leading-tight text-lg md:text-xl">情報I 重要語句マスター</h1><p class="text-xs text-slate-400">説明付き・総意率3 0.5以上 ／ ${TERMS.length}語</p></div></div></button><nav class="grid grid-cols-4 gap-1 bg-slate-900/70 border border-slate-800 rounded-2xl p-1">${nav.map(([v,label,icon])=>`<button data-view="${v}" class="px-2 md:px-4 py-2 rounded-xl text-[11px] md:text-sm font-bold transition ${this.view===v?'bg-slate-700 text-white shadow':'text-slate-400 hover:text-white hover:bg-slate-800'}"><i class="fa-solid ${icon} mr-0 md:mr-1"></i><span class="hidden sm:inline">${label}</span></button>`).join('')}</nav></div></header>`;
  }
  home() {
    const cats=this.categories.length, weak=this.weakTerms.length;
    return `<section class="h-full overflow-y-auto custom-scrollbar p-4 md:p-8 animate-fade-in"><div class="max-w-6xl mx-auto grid lg:grid-cols-[1.1fr_.9fr] gap-6 items-stretch"><div class="glass rounded-[2rem] p-6 md:p-9 flex flex-col justify-center min-h-[420px]"><div class="inline-flex items-center gap-2 text-cyan-200 bg-cyan-500/10 border border-cyan-400/20 rounded-full px-3 py-1 text-xs font-bold w-fit mb-5"><i class="fa-solid fa-sparkles"></i> 情報処理学会 用語リスト活用版</div><h2 class="text-3xl md:text-5xl font-black leading-tight mb-4 bg-gradient-to-r from-white via-cyan-100 to-blue-300 bg-clip-text text-transparent">覚える語句を、<br>ちゃんと絞った。</h2><p class="text-slate-300 leading-relaxed mb-7">説明が付いていて、情報Iの総意率3が0.5以上の語句だけを収録。検索・カテゴリ別学習・重要度表示・2種類のクイズ・苦手チェックまで入れた版です。</p><div class="grid sm:grid-cols-3 gap-3 mb-8">${this.statCard('収録語句',TERMS.length+'語','fa-database')}${this.statCard('カテゴリ',cats+'種類','fa-tags')}${this.statCard('苦手',weak+'語','fa-bookmark')}</div><div class="grid sm:grid-cols-3 gap-3"><button data-view="list" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black rounded-2xl px-5 py-4 transition shadow-lg shadow-cyan-900/30"><i class="fa-solid fa-magnifying-glass mr-2"></i>一覧で学習</button><button data-view="quizSetup" class="bg-white hover:bg-slate-200 text-slate-950 font-black rounded-2xl px-5 py-4 transition"><i class="fa-solid fa-play mr-2"></i>クイズ開始</button><button data-view="weak" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-black rounded-2xl px-5 py-4 transition"><i class="fa-solid fa-bookmark mr-2"></i>苦手だけ</button></div></div><div class="space-y-4">${this.featureCard('重要語句一覧','用語・カテゴリ・説明をカード形式で確認。授業前の確認にも使いやすい。','fa-table-list','from-cyan-500 to-blue-600')}${this.featureCard('検索・カテゴリ別表示','用語名だけでなく、説明文の中身からも検索。カテゴリを押せば絞り込み。','fa-filter','from-violet-500 to-fuchsia-600')}${this.featureCard('重要度表示','総意率3を★とゲージで表示。まず覚えるべき語句が見える。','fa-star-half-stroke','from-amber-400 to-orange-600')}${this.featureCard('2種類のクイズ','説明→用語、用語→説明の両方に対応。カテゴリ別クイズも可能。','fa-circle-question','from-emerald-400 to-teal-600')}${this.featureCard('苦手チェック','覚えていない語句を手動追加。クイズで間違えた語句も自動で苦手に追加。','fa-bookmark','from-rose-400 to-pink-600')}</div></div></section>`;
  }
  statCard(label,value,icon){ return `<div class="rounded-2xl bg-slate-900/70 border border-slate-800 p-4"><i class="fa-solid ${icon} text-cyan-300 mb-2"></i><div class="text-2xl font-black">${value}</div><div class="text-xs text-slate-400">${label}</div></div>`; }
  featureCard(title,body,icon,grad){ return `<div class="glass rounded-3xl p-5 flex gap-4 items-start"><div class="w-12 h-12 rounded-2xl bg-gradient-to-br ${grad} flex items-center justify-center shrink-0 shadow-lg"><i class="fa-solid ${icon}"></i></div><div><h3 class="font-black text-lg">${title}</h3><p class="text-sm text-slate-400 leading-relaxed">${body}</p></div></div>`; }
  controls() {
    return `<div class="glass rounded-3xl p-4 mb-4"><div class="grid lg:grid-cols-[1fr_210px_190px] gap-3"><label class="relative block"><i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i><input id="searchInput" value="${this.escape(this.query)}" placeholder="用語名・説明文から検索" class="w-full bg-slate-950/70 border border-slate-700 rounded-2xl pl-11 pr-4 py-3 outline-none focus:border-cyan-400 transition"></label><select id="categorySelect" class="bg-slate-950/70 border border-slate-700 rounded-2xl px-4 py-3 outline-none focus:border-cyan-400"><option value="すべて">すべてのカテゴリ</option>${this.categories.map(([c,n])=>`<option value="${this.escape(c)}" ${this.category===c?'selected':''}>${this.escape(c)}（${n}）</option>`).join('')}</select><select id="sortSelect" class="bg-slate-950/70 border border-slate-700 rounded-2xl px-4 py-3 outline-none focus:border-cyan-400"><option value="rate" ${this.sort==='rate'?'selected':''}>重要度順</option><option value="term" ${this.sort==='term'?'selected':''}>五十音順</option><option value="category" ${this.sort==='category'?'selected':''}>カテゴリ順</option></select></div><div class="mt-3 flex gap-2 overflow-x-auto custom-scrollbar pb-1"><button data-cat="すべて" class="cat-chip shrink-0 px-3 py-1.5 rounded-full text-xs font-bold border ${this.category==='すべて'?'bg-cyan-400 text-slate-950 border-cyan-300':'bg-slate-900 text-slate-300 border-slate-700 hover:border-cyan-500'}">すべて ${TERMS.length}</button>${this.categories.slice(0,30).map(([c,n])=>`<button data-cat="${this.escape(c)}" class="cat-chip shrink-0 px-3 py-1.5 rounded-full text-xs font-bold border ${this.category===c?'bg-cyan-400 text-slate-950 border-cyan-300':'bg-slate-900 text-slate-300 border-slate-700 hover:border-cyan-500'}">${this.escape(c)} ${n}</button>`).join('')}</div></div>`;
  }
  listView(){ const list=this.filteredTerms; return `<section class="h-full overflow-y-auto custom-scrollbar p-4 md:p-6 animate-fade-in"><div class="max-w-6xl mx-auto"><div class="flex flex-col md:flex-row md:items-end justify-between gap-3 mb-4"><div><h2 class="text-2xl md:text-3xl font-black">重要語句一覧</h2><p class="text-sm text-slate-400">用語・カテゴリ・説明を表示。★やゲージで重要度も確認できます。</p></div><button id="quizFiltered" class="rounded-2xl bg-white text-slate-950 hover:bg-slate-200 font-black px-5 py-3 transition"><i class="fa-solid fa-play mr-2"></i>この条件でクイズ</button></div>${this.controls()}<div class="text-sm text-slate-400 mb-3">表示中：<span class="text-white font-bold">${list.length}</span> 語</div><div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4 pb-10">${list.map(t=>this.termCard(t)).join('')}</div></div></section>`; }
  termCard(t){ const weak=this.weakIds.has(t.id); return `<article class="glass rounded-3xl p-5 animate-slide-up"><div class="flex items-start justify-between gap-2 mb-3"><div class="min-w-0"><h3 class="text-lg font-black leading-snug break-words">${this.highlight(this.escape(t.term))}</h3><span class="inline-flex mt-2 px-2 py-1 rounded-full bg-blue-500/15 text-blue-200 border border-blue-400/20 text-[11px] font-bold">${this.escape(t.category)}</span></div><button data-weak="${t.id}" class="weak-btn shrink-0 w-10 h-10 rounded-2xl border transition ${weak?'bg-rose-500/20 border-rose-400 text-rose-300':'bg-slate-900/70 border-slate-700 text-slate-500 hover:text-rose-300 hover:border-rose-400'}" title="苦手チェック"><i class="fa-${weak?'solid':'regular'} fa-bookmark"></i></button></div><p class="text-sm text-slate-300 leading-relaxed mb-4">${this.highlight(this.escape(t.desc))}</p>${this.importanceHtml(t.rate)}</article>`; }
  importanceHtml(rate){ const pct=Math.round(rate*100); const stars=Math.max(1,Math.round(rate*5)); return `<div><div class="flex items-center justify-between text-xs mb-1"><span class="text-amber-300">${'★'.repeat(stars)}${'☆'.repeat(5-stars)}</span><span class="font-mono text-slate-400">総意率3 ${pct}%</span></div><div class="h-2 rounded-full bg-slate-800 overflow-hidden"><div class="h-full rounded-full bg-gradient-to-r from-cyan-400 via-blue-400 to-fuchsia-400" style="width:${pct}%"></div></div></div>`; }
  quizSetupView(){ const targetCount=this.getQuizPool().length; return `<section class="h-full overflow-y-auto custom-scrollbar p-4 md:p-8 animate-fade-in"><div class="max-w-4xl mx-auto"><div class="glass rounded-[2rem] p-6 md:p-8"><h2 class="text-3xl font-black mb-2">クイズ</h2><p class="text-slate-400 mb-6">説明→用語、用語→説明のどちらでも確認できます。カテゴリ別・苦手語句だけの出題もできます。</p><div class="grid md:grid-cols-2 gap-5 mb-6"><div class="rounded-3xl bg-slate-900/70 border border-slate-800 p-5"><h3 class="font-black mb-3"><i class="fa-solid fa-right-left text-cyan-300 mr-2"></i>出題形式</h3><div class="grid gap-2">${this.radioButton('quizType','descToTerm','説明 → 用語を選ぶ','説明文を読んで、正しい用語を選びます。')}${this.radioButton('quizType','termToDesc','用語 → 説明を選ぶ','用語を見て、正しい説明文を選びます。')}</div></div><div class="rounded-3xl bg-slate-900/70 border border-slate-800 p-5"><h3 class="font-black mb-3"><i class="fa-solid fa-filter text-violet-300 mr-2"></i>出題範囲</h3><select id="quizSource" class="w-full bg-slate-950/70 border border-slate-700 rounded-2xl px-4 py-3 outline-none focus:border-cyan-400 mb-3"><option value="all" ${this.quizSource==='all'?'selected':''}>すべての語句（${TERMS.length}語）</option><option value="weak" ${this.quizSource==='weak'?'selected':''}>苦手チェックのみ（${this.weakTerms.length}語）</option>${this.categories.map(([c,n])=>`<option value="cat:${this.escape(c)}" ${this.quizSource==='cat:'+c?'selected':''}>${this.escape(c)}（${n}語）</option>`).join('')}</select><p class="text-xs text-slate-400">現在の出題候補：<span class="text-white font-bold">${targetCount}</span>語</p></div></div><div class="grid sm:grid-cols-3 gap-3"><button data-start="10" class="start-quiz rounded-2xl bg-yellow-400 hover:bg-yellow-300 text-slate-950 font-black px-5 py-4 transition"><i class="fa-solid fa-bolt mr-2"></i>10問</button><button data-start="20" class="start-quiz rounded-2xl bg-cyan-400 hover:bg-cyan-300 text-slate-950 font-black px-5 py-4 transition"><i class="fa-solid fa-layer-group mr-2"></i>20問</button><button data-start="all" class="start-quiz rounded-2xl bg-white hover:bg-slate-200 text-slate-950 font-black px-5 py-4 transition"><i class="fa-solid fa-list-check mr-2"></i>全問</button></div></div></div></section>`; }
  radioButton(group,value,title,desc){ const checked=this[group]===value; return `<button data-radio-group="${group}" data-radio-value="${value}" class="radio-btn text-left rounded-2xl border p-4 transition ${checked?'bg-cyan-500/15 border-cyan-300':'bg-slate-950/40 border-slate-700 hover:border-slate-500'}"><div class="font-black ${checked?'text-cyan-200':'text-white'}">${title}</div><div class="text-xs text-slate-400 mt-1">${desc}</div></button>`; }
  getQuizPool(){ if(this.quizSource==='weak') return this.weakTerms; if(this.quizSource.startsWith('cat:')) return TERMS.filter(t=>t.category===this.quizSource.slice(4)); return TERMS; }
  startQuiz(count, customPool=null){ const pool=customPool || this.getQuizPool(); if(pool.length<4){ alert('出題候補が4語以上必要です。'); return; } const shuffled=[...pool].sort(()=>Math.random()-0.5); const limit=count==='all'?shuffled.length:Math.min(Number(count),shuffled.length); const targets=shuffled.slice(0,limit); this.questions=targets.map(correct=>this.buildQuestion(correct,pool)); this.currentIndex=0; this.score=0; this.history=[]; this.isAnswered=false; this.selectedOption=null; this.view='quiz'; this.render(); }
  buildQuestion(correct,pool){ let distractors=pool.filter(t=>t.id!==correct.id && t.category===correct.category).sort(()=>Math.random()-0.5).slice(0,3); if(distractors.length<3){ const needed=3-distractors.length; distractors=distractors.concat(pool.filter(t=>t.id!==correct.id && !distractors.some(d=>d.id===t.id)).sort(()=>Math.random()-0.5).slice(0,needed)); } return {...correct, options:[correct,...distractors].sort(()=>Math.random()-0.5)}; }
  quizView(){ const q=this.questions[this.currentIndex]; const prompt=this.quizType==='descToTerm'?q.desc:q.term; const promptLabel=this.quizType==='descToTerm'?'この説明にあてはまる用語は？':'この用語の説明として正しいものは？'; return `<section class="h-full overflow-y-auto custom-scrollbar p-4 md:p-6 animate-fade-in"><div class="max-w-4xl mx-auto min-h-full flex flex-col justify-center"><div class="flex items-center justify-between gap-3 mb-4"><div class="font-mono text-slate-400">QUESTION <span class="text-white text-2xl font-black">${this.currentIndex+1}</span> / ${this.questions.length}</div><button data-view="quizSetup" class="text-slate-400 hover:text-white text-sm"><i class="fa-solid fa-xmark mr-1"></i>終了</button></div><div class="glass rounded-[2rem] p-6 md:p-8 mb-5"><div class="flex flex-wrap gap-2 mb-4"><span class="px-3 py-1 rounded-full text-xs font-bold bg-blue-500/15 text-blue-200 border border-blue-400/20">${this.escape(q.category)}</span><span class="px-3 py-1 rounded-full text-xs font-bold bg-amber-500/15 text-amber-200 border border-amber-400/20">総意率3 ${Math.round(q.rate*100)}%</span></div><p class="text-xs text-cyan-200 font-bold mb-3">${promptLabel}</p><div class="rounded-3xl bg-slate-950/60 border border-slate-800 p-6 min-h-[130px] flex items-center justify-center"><p class="text-xl md:text-2xl font-bold leading-relaxed text-center">${this.escape(prompt)}</p></div></div><div class="grid md:grid-cols-2 gap-3 mb-5">${q.options.map((op,i)=>this.optionButton(op,i,q)).join('')}</div><div class="h-16 flex justify-center">${this.isAnswered ? `<button id="nextQ" class="rounded-full bg-white hover:bg-slate-200 text-slate-950 font-black px-8 py-3 transition animate-pop">${this.currentIndex < this.questions.length-1 ? '次の問題へ' : '結果を見る'} <i class="fa-solid fa-chevron-right ml-2"></i></button>` : ''}</div></div></section>`; }
  optionButton(op,i,q){ const correct=op.id===q.id; const selected=this.selectedOption&&this.selectedOption.id===op.id; let cls='bg-slate-900/80 border-slate-700 hover:border-cyan-400 hover:bg-slate-800'; let icon=''; if(this.isAnswered){ if(correct){ cls='bg-emerald-500/15 border-emerald-400 text-emerald-100'; icon='<i class="fa-solid fa-circle-check ml-auto text-emerald-300"></i>'; } else if(selected){ cls='bg-rose-500/15 border-rose-400 text-rose-100'; icon='<i class="fa-solid fa-circle-xmark ml-auto text-rose-300"></i>'; } else { cls='bg-slate-950/40 border-slate-800 opacity-55'; } } const text=this.quizType==='descToTerm'?op.term:op.desc; return `<button data-answer="${i}" ${this.isAnswered?'disabled':''} class="answer-btn min-h-[76px] text-left rounded-2xl border-2 p-4 font-bold flex items-center gap-2 transition ${cls}"><span class="leading-relaxed">${this.escape(text)}</span>${icon}</button>`; }
  handleAnswer(i){ if(this.isAnswered) return; const q=this.questions[this.currentIndex]; const op=q.options[i]; const ok=op.id===q.id; this.selectedOption=op; this.isAnswered=true; if(ok) this.score++; if(!ok){ this.weakIds.add(q.id); this.saveWeakIds(); } this.history.push({question:q,userChoice:op,isCorrect:ok}); this.render(); }
  nextQuestion(){ if(this.currentIndex<this.questions.length-1){ this.currentIndex++; this.isAnswered=false; this.selectedOption=null; this.render(); } else { this.view='result'; this.render(); } }
  resultView(){ const pct=Math.round(this.score/this.questions.length*100); const wrong=this.history.filter(h=>!h.isCorrect); return `<section class="h-full overflow-y-auto custom-scrollbar p-4 md:p-6 animate-fade-in"><div class="max-w-4xl mx-auto"><div class="glass rounded-[2rem] p-6 md:p-8 mb-5 text-center"><i class="fa-solid fa-award text-5xl ${pct>=80?'text-amber-300':'text-slate-400'} mb-3"></i><h2 class="text-3xl font-black mb-2">Result</h2><div class="text-6xl font-black bg-gradient-to-r from-cyan-200 to-blue-400 text-transparent bg-clip-text">${this.score}<span class="text-2xl text-slate-500"> / ${this.questions.length}</span></div><p class="font-mono text-slate-400 mt-2">Accuracy: ${pct}%</p><p class="text-xs text-slate-500 mt-2">間違えた語句は自動で「苦手チェック」に追加しました。</p><div class="flex flex-col sm:flex-row justify-center gap-3 mt-6">${wrong.length ? `<button id="retryWrong" class="rounded-2xl bg-orange-500 hover:bg-orange-400 text-white font-black px-5 py-3 transition"><i class="fa-solid fa-rotate mr-2"></i>間違えた問題だけ解く</button>` : ''}<button data-view="quizSetup" class="rounded-2xl bg-white hover:bg-slate-200 text-slate-950 font-black px-5 py-3 transition"><i class="fa-solid fa-circle-question mr-2"></i>別のクイズへ</button><button data-view="list" class="rounded-2xl bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-black px-5 py-3 transition"><i class="fa-solid fa-table-list mr-2"></i>一覧へ</button></div></div><div class="space-y-3 pb-10">${this.history.map(h=>this.resultRow(h)).join('')}</div></div></section>`; }
  resultRow(h){ return `<div class="glass rounded-3xl p-4 flex gap-3"><div class="pt-1"><i class="fa-solid ${h.isCorrect?'fa-circle-check text-emerald-300':'fa-circle-xmark text-rose-300'}"></i></div><div class="flex-1"><div class="flex flex-wrap items-center justify-between gap-2"><h3 class="font-black">${this.escape(h.question.term)}</h3><span class="text-xs text-slate-400">${this.escape(h.question.category)} ／ ${Math.round(h.question.rate*100)}%</span></div><p class="text-sm text-slate-300 mt-1">${this.escape(h.question.desc)}</p>${!h.isCorrect?`<p class="text-xs text-rose-200 mt-2 bg-rose-500/10 border border-rose-400/20 rounded-xl px-3 py-2">あなたの回答：${this.escape(this.quizType==='descToTerm'?h.userChoice.term:h.userChoice.desc)}</p>`:''}</div></div>`; }
  weakView(){ const list=this.weakTerms; return `<section class="h-full overflow-y-auto custom-scrollbar p-4 md:p-6 animate-fade-in"><div class="max-w-6xl mx-auto"><div class="flex flex-col md:flex-row md:items-end justify-between gap-3 mb-5"><div><h2 class="text-2xl md:text-3xl font-black">苦手チェック</h2><p class="text-sm text-slate-400">覚えていない語句だけを残せます。手動追加・クイズ間違いで自動追加されます。</p></div><div class="flex gap-2"><button id="quizWeak" class="rounded-2xl bg-white text-slate-950 hover:bg-slate-200 font-black px-5 py-3 transition" ${list.length<4?'disabled':''}><i class="fa-solid fa-play mr-2"></i>苦手だけクイズ</button><button id="clearWeak" class="rounded-2xl bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white font-black px-5 py-3 transition"><i class="fa-solid fa-trash mr-2"></i>全解除</button></div></div>${list.length ? `<div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4 pb-10">${list.map(t=>this.termCard(t)).join('')}</div>` : `<div class="glass rounded-[2rem] p-10 text-center"><i class="fa-regular fa-bookmark text-5xl text-slate-500 mb-4"></i><h3 class="text-xl font-black mb-2">苦手語句はまだありません</h3><p class="text-slate-400 mb-5">一覧画面でブックマークを押すか、クイズで間違えるとここに追加されます。</p><button data-view="list" class="rounded-2xl bg-cyan-400 text-slate-950 font-black px-5 py-3"><i class="fa-solid fa-table-list mr-2"></i>一覧で語句を見る</button></div>`}</div></section>`; }
  attachEvents(){
    document.querySelectorAll('[data-view]').forEach(btn=>btn.addEventListener('click',()=>{this.view=btn.dataset.view; this.render();}));
    const search=document.getElementById('searchInput'); if(search) search.addEventListener('input',e=>{this.query=e.target.value; this.render();});
    const cat=document.getElementById('categorySelect'); if(cat) cat.addEventListener('change',e=>{this.category=e.target.value; this.render();});
    const sort=document.getElementById('sortSelect'); if(sort) sort.addEventListener('change',e=>{this.sort=e.target.value; this.render();});
    document.querySelectorAll('.cat-chip').forEach(b=>b.addEventListener('click',()=>{this.category=b.dataset.cat; this.render();}));
    document.querySelectorAll('.weak-btn').forEach(b=>b.addEventListener('click',(e)=>{e.stopPropagation(); const id=Number(b.dataset.weak); this.weakIds.has(id)?this.weakIds.delete(id):this.weakIds.add(id); this.saveWeakIds(); this.render();}));
    document.querySelectorAll('.radio-btn').forEach(b=>b.addEventListener('click',()=>{this[b.dataset.radioGroup]=b.dataset.radioValue; this.render();}));
    const qs=document.getElementById('quizSource'); if(qs) qs.addEventListener('change',e=>{this.quizSource=e.target.value; this.render();});
    document.querySelectorAll('.start-quiz').forEach(b=>b.addEventListener('click',()=>this.startQuiz(b.dataset.start)));
    document.querySelectorAll('.answer-btn').forEach(b=>b.addEventListener('click',()=>this.handleAnswer(Number(b.dataset.answer))));
    const next=document.getElementById('nextQ'); if(next) next.addEventListener('click',()=>this.nextQuestion());
    const retry=document.getElementById('retryWrong'); if(retry) retry.addEventListener('click',()=>this.startQuiz('all', this.history.filter(h=>!h.isCorrect).map(h=>h.question)));
    const quizWeak=document.getElementById('quizWeak'); if(quizWeak) quizWeak.addEventListener('click',()=>{this.quizSource='weak'; this.view='quizSetup'; this.render();});
    const clearWeak=document.getElementById('clearWeak'); if(clearWeak) clearWeak.addEventListener('click',()=>{if(confirm('苦手チェックをすべて解除しますか？')){this.weakIds.clear(); this.saveWeakIds(); this.render();}});
    const quizFiltered=document.getElementById('quizFiltered'); if(quizFiltered) quizFiltered.addEventListener('click',()=>this.startQuiz('all', this.filteredTerms));
  }
  escape(s){ return String(s ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
  highlight(escaped){
    const q=this.escape(this.query.trim()); if(!q) return escaped;
    try { return escaped.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'), m=>`<mark class="bg-yellow-300 text-slate-950 rounded px-0.5">${m}</mark>`); } catch(e) { return escaped; }
  }
}
const app = new TermMaster();
</script>
</body>
</html>
