<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アンケート集計・レポート作成ツール</title>
    
    <!-- 必要なライブラリの読み込み -->
    <!-- SheetJS: Excelファイルの読み込み用 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Chart.js: グラフ描画用 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- ChartDataLabels: グラフ上に件数やパーセントを表示するためのプラグイン -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <!-- html2pdf.js: 表示画面をPDFに変換する用 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* 基本のカラースキームとフォント設定 */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --sidebar-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --warning: #f59e0b;
        }

        body {
            font-family: "Meiryo", "Yu Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* -----------------------
           左側：設定パネル
        ----------------------- */
        #sidebar {
            width: 420px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            background-color: var(--primary);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .sidebar-content {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* フォーム部品のスタイル */
        .control-group {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px dashed var(--border);
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.95rem;
            color: #374151;
        }

        input[type="text"], input[type="file"], select {
            width: 100%;
            padding: 8px 10px;
            box-sizing: border-box;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-family: inherit;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            font-weight: bold;
            transition: background-color 0.2s;
            margin-bottom: 10px;
        }

        button:hover { background-color: var(--primary-hover); }
        button.btn-secondary { background-color: #6b7280; }
        button.btn-secondary:hover { background-color: #4b5563; }
        button.btn-danger { background-color: #ef4444; width: auto; padding: 10px 20px; }
        button.btn-danger:hover { background-color: #dc2626; }
        button.btn-success { background-color: #10b981; width: auto; padding: 10px 20px; }
        button.btn-success:hover { background-color: #059669; }

        /* 設問リストアイテム */
        .question-item {
            background: #f9fafb;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: opacity 0.3s;
        }

        .question-item.disabled {
            opacity: 0.6;
            background: #f3f4f6;
        }

        .question-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .question-header input[type="checkbox"] {
            transform: scale(1.3);
            cursor: pointer;
        }

        .question-header label {
            margin: 0;
            flex-grow: 1;
            cursor: pointer;
            font-weight: bold;
            word-break: break-all;
            line-height: 1.3;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            font-size: 0.75rem;
            font-weight: normal;
            border-radius: 12px;
            background-color: #e5e7eb;
            color: #4b5563;
        }

        .warning-text {
            color: #d97706;
            font-size: 0.8rem;
            margin-top: -5px;
            margin-bottom: 5px;
        }

        /* -----------------------
           右側：プレビュー領域
        ----------------------- */
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            align-items: center;
        }

        .top-toolbar {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 15px 30px;
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 5;
            box-sizing: border-box;
        }

        /* A4サイズのプレビュー用紙 */
        #report-preview {
            background: white;
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            box-sizing: border-box;
            margin: 30px 0;
            color: black;
        }

        /* PDF出力時は、画面表示用の余白(padding)を一時的にオフにして、html2pdfのmarginオプションに任せる */
        #report-preview.pdf-exporting {
            padding: 0 !important;
            margin: 0 !important;
            box-shadow: none !important;
            min-height: auto !important;
        }

        /* レポート内のスタイル */
        .report-header { padding-bottom: 30px; }
        .report-title { text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .report-subtitle { text-align: center; font-size: 18px; color: #555; margin-bottom: 20px; }
        .report-date { text-align: right; font-size: 14px; }

        /* --- シンプルな改ページ・レイアウト定義 --- */
        .question-block {
            width: 100%;
            margin-bottom: 40px; 
            page-break-inside: avoid; /* 基本的にブロック途中で切れるのを防ぐ */
        }

        /* 記述式のブロックは新しいページから開始する */
        .question-block.text-block {
            page-break-before: always;
        }
        
        /* 一番最初が記述式だった場合は改ページしない */
        #preview-area > .question-block.text-block:first-child {
            page-break-before: auto;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-left: 6px solid var(--primary);
            padding-left: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title .badge {
            background-color: #f3f4f6;
            border: 1px solid #d1d5db;
        }

        /* グラフコンテナ */
        .canvas-container {
            position: relative;
            height: 300px; 
            width: 85%;
            margin: 0 auto;
        }

        /* 記述回答用スタイル */
        .text-summary {
            background-color: #f9fafb;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            border: 1px solid #e5e7eb;
        }
        
        .text-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .text-list li {
            padding: 10px 0;
            border-bottom: 1px dashed #d1d5db;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-wrap;
            page-break-inside: avoid;
        }
        .text-list li:last-child { border-bottom: none; }

        .empty-message {
            text-align: center;
            color: var(--text-muted);
            margin-top: 100px;
            line-height: 2;
        }

        /* --- カスタムモーダル（警告・確認ダイアログ用） --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .modal-content p {
            margin-bottom: 25px;
            font-size: 1.05rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .modal-buttons button {
            margin: 0;
            width: auto;
            min-width: 100px;
            padding: 10px 20px;
        }

        /* ブラウザの印刷機能用スタイル */
        @media print {
            body { 
                background: white; 
                display: block;
                height: auto;
                overflow: visible;
            }
            #sidebar, .top-toolbar { display: none; }
            #main-content { 
                overflow: visible; 
                padding: 0; 
                display: block;
            }
            #report-preview {
                box-shadow: none;
                margin: 0;
                width: 100%;
                padding: 0; /* 印刷時の余白はブラウザに任せる */
            }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">設定パネル</div>
        <div class="sidebar-content">
            
            <div class="control-group">
                <label>1. Excelファイル読込 (.xlsx)</label>
                <input type="file" id="file-input" accept=".xlsx, .xls, .csv">
                <button class="btn-secondary" onclick="loadDummyData()" style="margin-top: 10px; font-size: 0.9rem;">
                    サンプルデータで試す
                </button>
            </div>

            <div class="control-group">
                <label>2. レポート表題設定</label>
                <input type="text" id="input-title" value="アンケート集計結果" placeholder="メインタイトル" oninput="updateHeader()">
                <input type="text" id="input-subtitle" value="自動集計レポート" placeholder="サブタイトル" oninput="updateHeader()">
                <input type="text" id="input-date" value="" placeholder="作成日" oninput="updateHeader()">
            </div>

            <div class="control-group" id="questions-container" style="display: none; border-bottom: none;">
                <label>3. 設問とグラフ設定</label>
                <div id="question-list">
                    <!-- JSで動的に生成 -->
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button onclick="renderPreview()" style="margin-bottom: 0; flex: 2;">プレビューに反映する</button>
                    <button class="btn-secondary" onclick="resetApp()" style="margin-bottom: 0; flex: 1; padding: 12px 0;">リセット</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div class="top-toolbar">
            <button class="btn-success" onclick="exportViaPrint()">PDF出力 (ブラウザ標準・推奨)</button>
            <button class="btn-danger" onclick="exportToPDF()">PDF出力 (html2pdf)</button>
        </div>
        
        <div id="report-preview">
            <div class="report-header">
                <div class="report-title" id="preview-title">アンケート集計結果</div>
                <div class="report-subtitle" id="preview-subtitle">サブタイトル</div>
                <div class="report-date" id="preview-date"></div>
            </div>
            
            <div id="preview-area">
                <div class="empty-message">
                    <strong>左側のパネルからExcelファイルをアップロードするか、<br>「サンプルデータで試す」ボタンを押してください。</strong><br><br>
                    ※先頭行が見出し（設問）として読み込まれます。<br>
                    ※データはすべてお使いのブラウザ内でのみ処理されます。
                </div>
            </div>
        </div>
    </div>

    <!-- カスタムモーダル UI -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <p id="modal-message"></p>
            <div class="modal-buttons" id="modal-buttons"></div>
        </div>
    </div>

    <script>
        let rawData = [];
        let columns = [];
        let questionConfig = {};
        let chartInstances = {};

        window.addEventListener('DOMContentLoaded', () => {
            if (typeof Chart !== 'undefined' && typeof ChartDataLabels !== 'undefined') {
                Chart.register(ChartDataLabels);
            }

            const today = new Date();
            const inputDate = document.getElementById('input-date');
            if (inputDate) {
                inputDate.value = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
            }
            updateHeader();
            
            const fileInput = document.getElementById('file-input');
            if (fileInput) {
                fileInput.addEventListener('change', handleFileUpload);
            }
        });

        function updateHeader() {
            const previewTitle = document.getElementById('preview-title');
            const previewSubtitle = document.getElementById('preview-subtitle');
            const previewDate = document.getElementById('preview-date');
            
            const inputTitle = document.getElementById('input-title');
            const inputSubtitle = document.getElementById('input-subtitle');
            const inputDate = document.getElementById('input-date');

            if (previewTitle && inputTitle) previewTitle.innerText = inputTitle.value;
            if (previewSubtitle && inputSubtitle) previewSubtitle.innerText = inputSubtitle.value;
            if (previewDate && inputDate) previewDate.innerText = inputDate.value;
        }

        // カスタムモーダルの制御関数
        function showModal(message, isConfirm, onConfirm) {
            const modal = document.getElementById('custom-modal');
            const msgEl = document.getElementById('modal-message');
            const btnsEl = document.getElementById('modal-buttons');
            
            if (!modal || !msgEl || !btnsEl) return;
            
            msgEl.innerText = message;
            btnsEl.innerHTML = '';
            
            if (isConfirm) {
                const btnCancel = document.createElement('button');
                btnCancel.className = 'btn-secondary';
                btnCancel.innerText = 'キャンセル';
                btnCancel.onclick = () => modal.classList.remove('active');
                
                const btnOk = document.createElement('button');
                btnOk.className = 'btn-danger';
                btnOk.innerText = 'リセットする';
                btnOk.onclick = () => {
                    modal.classList.remove('active');
                    if (onConfirm) onConfirm();
                };
                
                btnsEl.appendChild(btnCancel);
                btnsEl.appendChild(btnOk);
            } else {
                const btnOk = document.createElement('button');
                btnOk.style.backgroundColor = 'var(--primary)';
                btnOk.style.color = 'white';
                btnOk.innerText = 'OK';
                btnOk.onclick = () => modal.classList.remove('active');
                btnsEl.appendChild(btnOk);
            }
            
            modal.classList.add('active');
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    rawData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                    initializeData();
                } catch (error) {
                    showModal("ファイルの読み込みに失敗しました。正しいExcelファイルか確認してください。", false);
                    console.error(error);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function loadDummyData() {
            rawData = [
                {"タイムスタンプ": "10:00", "学年": "1年生", "よく使う端末": "スマホ, タブレット", "授業の理解度": "よくわかる", "要望（自由記述）": "実習をもっと増やしてほしいです。\n特にプログラミング。"},
                {"タイムスタンプ": "10:05", "学年": "2年生", "よく使う端末": "スマホ / PC", "授業の理解度": "だいたいわかる", "要望（自由記述）": "特になし"},
                {"タイムスタンプ": "10:10", "学年": "1年生", "よく使う端末": "スマホ", "授業の理解度": "よくわかる", "要望（自由記述）": "先生の説明がわかりやすい。"},
                {"タイムスタンプ": "10:15", "学年": "3年生", "よく使う端末": "PC、タブレット", "授業の理解度": "あまりわからない", "要望（自由記述）": "専門用語が多くてついていけない時があります。"},
                {"タイムスタンプ": "10:20", "学年": "1年生", "よく使う端末": "スマホ、スマホ", "授業の理解度": "だいたいわかる", "要望（自由記述）": ""},
                {"タイムスタンプ": "10:25", "学年": "2年生", "よく使う端末": "PC", "授業の理解度": "どちらともいえない", "要望（自由記述）": "図書室の専門書を増やしてください。\n図鑑もほしいです。"},
                {"タイムスタンプ": "10:30", "学年": "3年生", "よく使う端末": "スマホ / PC ／ タブレット", "授業の理解度": "よくわかる", "要望（自由記述）": "グループワークが楽しいです。"},
                {"タイムスタンプ": "10:35", "学年": "1年生", "よく使う端末": "タブレット", "授業の理解度": "だいたいわかる", "要望（自由記述）": "プリントの文字を少し大きくしてほしいです。"},
                {"タイムスタンプ": "10:40", "学年": "2年生", "よく使う端末": "スマホ", "授業の理解度": "よくわかる", "要望（自由記述）": "今のままで良いと思います。"},
                {"タイムスタンプ": "10:45", "学年": "3年生", "よく使う端末": "PC", "授業の理解度": "よくわかる", "要望（自由記述）": "受験対策をもっと早めにお願いします。"}
            ];
            initializeData();
        }

        function initializeData() {
            if (!rawData || rawData.length === 0) { 
                showModal("データが空です。", false); 
                return; 
            }
            columns = Object.keys(rawData[0]);
            questionConfig = {};

            const excludeKeywords = ['タイムスタンプ', 'timestamp', 'メールアドレス', 'email', '氏名', '名前', 'id'];

            columns.forEach(col => {
                const colName = col.toLowerCase();
                let isExcluded = excludeKeywords.some(kw => colName.includes(kw));

                const detectedType = detectQuestionType(col);
                if (detectedType === 'text') isExcluded = true;

                questionConfig[col] = {
                    enabled: !isExcluded,
                    title: col,
                    detectedType: detectedType,
                    type: detectedType,
                    chartType: detectedType === 'multiple' ? 'bar' : 'pie',
                    dataLabelType: 'count',
                    textDisplayMode: 'list'
                };
            });

            buildQuestionListUI();
            
            const qContainer = document.getElementById('questions-container');
            if (qContainer) qContainer.style.display = 'block';
            
            renderPreview();
        }

        function detectQuestionType(col) {
            const validAnswers = rawData.map(r => r[col]).filter(v => v !== undefined && v !== null && v !== "");
            if (validAnswers.length === 0) return 'text';

            let delimiterCount = 0;
            let totalLength = 0;
            const uniqueAnswers = new Set();
            const delimiterRegex = /[,、/／\n]/;

            validAnswers.forEach(val => {
                const str = String(val);
                if (delimiterRegex.test(str)) delimiterCount++;
                totalLength += str.length;
                uniqueAnswers.add(str);
            });

            const uniqueRatio = uniqueAnswers.size / validAnswers.length;
            const delimiterRatio = delimiterCount / validAnswers.length;
            const avgLength = totalLength / validAnswers.length;

            if (delimiterRatio > 0.1) {
                return 'multiple';
            } else if (uniqueRatio > 0.8 && avgLength > 10) {
                return 'text';
            } else {
                return 'single';
            }
        }

        function buildQuestionListUI() {
            const listContainer = document.getElementById('question-list');
            if (!listContainer) return;
            
            listContainer.innerHTML = '';
            const typeNames = { single: '単一回答', multiple: '複数回答', text: '記述' };

            columns.forEach(col => {
                const conf = questionConfig[col];
                const itemDiv = document.createElement('div');
                itemDiv.className = `question-item ${conf.enabled ? '' : 'disabled'}`;

                const typeSelectHTML = `
                    <select onchange="updateConfigAndRender('${col}', 'type', this.value)" style="margin-bottom: 10px;">
                        <option value="single" ${conf.type === 'single' ? 'selected' : ''}>単一回答</option>
                        <option value="multiple" ${conf.type === 'multiple' ? 'selected' : ''}>複数回答</option>
                        <option value="text" ${conf.type === 'text' ? 'selected' : ''}>記述回答</option>
                    </select>
                `;

                let settingsHTML = '';
                if (conf.type === 'single' || conf.type === 'multiple') {
                    const warningHTML = (conf.type === 'multiple' && conf.chartType === 'pie') 
                        ? `<div class="warning-text">※複数回答の円グラフは合計が100%を超えるためご注意ください</div>` : '';
                    
                    settingsHTML = `
                        <input type="text" value="${conf.title}" placeholder="グラフのタイトル" onchange="updateConfig('${col}', 'title', this.value)">
                        <div style="display: flex; gap: 5px;">
                            <select onchange="updateConfigAndRender('${col}', 'chartType', this.value)">
                                <option value="pie" ${conf.chartType === 'pie' ? 'selected' : ''}>円グラフ</option>
                                <option value="bar" ${conf.chartType === 'bar' ? 'selected' : ''}>棒グラフ(縦)</option>
                                <option value="horizontalBar" ${conf.chartType === 'horizontalBar' ? 'selected' : ''}>棒グラフ(横)</option>
                                <option value="line" ${conf.chartType === 'line' ? 'selected' : ''}>折れ線グラフ</option>
                            </select>
                            <select onchange="updateConfigAndRender('${col}', 'dataLabelType', this.value)">
                                <option value="count" ${conf.dataLabelType === 'count' ? 'selected' : ''}>件数表示</option>
                                <option value="percent" ${conf.dataLabelType === 'percent' ? 'selected' : ''}>割合(%)表示</option>
                            </select>
                        </div>
                        ${warningHTML}
                    `;
                } else if (conf.type === 'text') {
                    settingsHTML = `
                        <input type="text" value="${conf.title}" placeholder="表示タイトル" onchange="updateConfig('${col}', 'title', this.value)">
                        <select onchange="updateConfigAndRender('${col}', 'textDisplayMode', this.value)">
                            <option value="list" ${conf.textDisplayMode === 'list' ? 'selected' : ''}>回答一覧を全文表示</option>
                            <option value="countOnly" ${conf.textDisplayMode === 'countOnly' ? 'selected' : ''}>件数・サマリのみ表示</option>
                        </select>
                    `;
                }

                itemDiv.innerHTML = `
                    <div class="question-header">
                        <input type="checkbox" id="chk-${col}" ${conf.enabled ? 'checked' : ''} onchange="updateConfigAndRender('${col}', 'enabled', this.checked)">
                        <label for="chk-${col}">${col} <span class="badge">自動: ${typeNames[conf.detectedType]}</span></label>
                    </div>
                    <div style="display: ${conf.enabled ? 'block' : 'none'};">
                        ${typeSelectHTML}
                        ${settingsHTML}
                    </div>
                `;
                listContainer.appendChild(itemDiv);
            });
        }

        function updateConfig(col, key, value) {
            questionConfig[col][key] = value;
        }

        function updateConfigAndRender(col, key, value) {
            questionConfig[col][key] = value;
            buildQuestionListUI();
        }

        function sortLabelsNaturally(labels) {
            const predefined = ["とても", "よく", "十分", "だいたい", "まあまあ", "どちらとも", "あまり", "まったく", "はい", "いいえ", "1年", "2年", "3年", "4年", "5年", "6年"];
            return labels.sort((a, b) => {
                let indexA = predefined.findIndex(p => String(a).includes(p));
                let indexB = predefined.findIndex(p => String(b).includes(p));
                if (indexA !== -1 && indexB !== -1) return indexA - indexB;
                if (indexA !== -1) return -1;
                if (indexB !== -1) return 1;
                
                if (!isNaN(parseFloat(a)) && !isNaN(parseFloat(b))) return parseFloat(a) - parseFloat(b);
                return String(a).localeCompare(String(b), 'ja');
            });
        }

        function aggregateSingle(colName) {
            const counts = {};
            let validTotal = 0;

            rawData.forEach(row => {
                let val = row[colName];
                if (val === undefined || val === null || val === "") return;
                let strVal = String(val).trim();
                counts[strVal] = (counts[strVal] || 0) + 1;
                validTotal++;
            });

            let sortedLabels = sortLabelsNaturally(Object.keys(counts));
            
            return {
                labels: sortedLabels,
                data: sortedLabels.map(l => counts[l]),
                total: validTotal,
                respondents: validTotal
            };
        }

        function aggregateMultiple(colName) {
            const counts = {};
            let validRespondents = 0;
            let totalChoices = 0;

            rawData.forEach(row => {
                let val = row[colName];
                if (val === undefined || val === null || val === "") return;
                
                let strVal = String(val);
                let items = strVal.split(/[,、/／\n]/).map(item => item.trim()).filter(item => item !== "");
                
                if (items.length > 0) {
                    validRespondents++;
                    let uniqueItems = [...new Set(items)];
                    uniqueItems.forEach(item => {
                        counts[item] = (counts[item] || 0) + 1;
                        totalChoices++;
                    });
                }
            });

            const sortedEntries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            return {
                labels: sortedEntries.map(e => e[0]),
                data: sortedEntries.map(e => e[1]),
                total: totalChoices,
                respondents: validRespondents
            };
        }

        function aggregateText(colName) {
            let validAnswers = [];
            let totalLength = 0;

            rawData.forEach(row => {
                let val = row[colName];
                if (val === undefined || val === null || val === "") return;
                let strVal = String(val).trim();
                if (strVal !== "") {
                    validAnswers.push(strVal);
                    totalLength += strVal.length;
                }
            });

            return {
                answers: validAnswers,
                count: validAnswers.length,
                avgLength: validAnswers.length > 0 ? (totalLength / validAnswers.length).toFixed(1) : 0
            };
        }

        function renderPreview() {
            const area = document.getElementById('preview-area');
            if (!area) return;
            
            area.innerHTML = '';

            Object.values(chartInstances).forEach(chart => {
                if (chart && typeof chart.destroy === 'function') {
                    chart.destroy();
                }
            });
            chartInstances = {};

            let renderedCount = 0;

            columns.forEach((col, index) => {
                const conf = questionConfig[col];
                if (!conf || !conf.enabled) return;

                renderedCount++;
                
                const title = document.createElement('div');
                title.className = 'section-title';
                const typeBadgeMap = { single: '単一', multiple: '複数', text: '記述' };
                title.innerHTML = `${conf.title || col} <span class="badge">${typeBadgeMap[conf.type]}</span>`;

                if (conf.type === 'single' || conf.type === 'multiple') {
                    const section = document.createElement('div');
                    section.className = 'question-block';
                    section.appendChild(title);
                    
                    const aggData = conf.type === 'single' ? aggregateSingle(col) : aggregateMultiple(col);
                    if (aggData.labels.length === 0) return;

                    const canvasContainer = document.createElement('div');
                    canvasContainer.className = 'canvas-container';
                    const canvas = document.createElement('canvas');
                    canvas.id = `canvas-${index}`;
                    canvasContainer.appendChild(canvas);
                    section.appendChild(canvasContainer);
                    
                    area.appendChild(section);

                    if (typeof Chart !== 'undefined') {
                        renderChart(canvas, conf, aggData, index);
                    } else {
                        canvasContainer.innerHTML = '<p style="text-align:center;color:red;">グラフ描画ライブラリが読み込めませんでした。</p>';
                    }
                } 
                else if (conf.type === 'text') {
                    const aggData = aggregateText(col);
                    
                    const block = document.createElement('div');
                    block.className = 'question-block text-block'; 
                    block.appendChild(title);
                    
                    const summaryDiv = document.createElement('div');
                    summaryDiv.className = 'text-summary';
                    summaryDiv.innerHTML = `
                        <strong>有効回答数：</strong> ${aggData.count} 件 
                        <span style="margin: 0 10px;">|</span> 
                        <strong>平均文字数：</strong> ${aggData.avgLength} 文字
                    `;
                    block.appendChild(summaryDiv);

                    if (conf.textDisplayMode === 'list' && aggData.answers.length > 0) {
                        const listUl = document.createElement('ul');
                        listUl.className = 'text-list';
                        aggData.answers.forEach(ans => {
                            const li = document.createElement('li');
                            li.innerText = ans; 
                            listUl.appendChild(li);
                        });
                        block.appendChild(listUl);
                    }
                    area.appendChild(block);
                }
            });

            if (renderedCount === 0) {
                area.innerHTML = '<div class="empty-message">対象の設問が選択されていません。<br>左側のチェックをオンにしてプレビューに反映してください。</div>';
            }
        }

        function renderChart(canvas, conf, aggData, index) {
            const ctx = canvas.getContext('2d');
            let cType = conf.chartType;
            let iAxis = 'x';

            if (cType === 'horizontalBar') {
                cType = 'bar';
                iAxis = 'y';
            }

            const colors = [
                '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', 
                '#14b8a6', '#f43f5e', '#84cc16', '#6366f1', '#06b6d4'
            ];

            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: iAxis,
                animation: { duration: 0 },
                plugins: {
                    legend: { display: cType === 'pie', position: 'right' },
                    datalabels: {
                        color: cType === 'pie' ? '#ffffff' : '#4b5563',
                        font: { weight: 'bold', size: 14 },
                        formatter: (value, context) => {
                            if (conf.dataLabelType === 'percent') {
                                let denominator = conf.type === 'multiple' ? aggData.respondents : aggData.total;
                                if(denominator === 0) return '0%';
                                let percentage = (value * 100 / denominator).toFixed(1) + "%";
                                if (cType === 'pie' && (value * 100 / denominator) < 5) return '';
                                return percentage;
                            } else {
                                return value + "件";
                            }
                        }
                    }
                },
                scales: cType !== 'pie' ? {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } },
                    x: { ticks: { stepSize: 1 } }
                } : {}
            };

            chartInstances[`chart-${index}`] = new Chart(ctx, {
                type: cType,
                data: {
                    labels: aggData.labels,
                    datasets: [{
                        label: '回答数',
                        data: aggData.data,
                        backgroundColor: cType === 'pie' ? colors : colors[0],
                        borderColor: cType === 'pie' ? '#ffffff' : colors[0],
                        borderWidth: 1
                    }]
                },
                options: chartOptions
            });
        }

        // --- ★推奨: ブラウザの標準印刷機能を使ったPDF出力 ---
        function exportViaPrint() {
            updateHeader();
            setTimeout(() => {
                window.print();
            }, 300);
        }

        // --- 従来のPDF出力 (html2pdf) ---
        function exportToPDF() {
            updateHeader();

            const element = document.getElementById('report-preview');
            const mainContent = document.getElementById('main-content');
            const fileName = document.getElementById('input-title').value || 'アンケートレポート';

            if (typeof html2pdf === 'undefined') {
                showModal("PDF生成ライブラリが読み込めていません。インターネット接続を確認してください。", false);
                return;
            }

            // スクロールによるキャプチャ漏れ（真っ白バグ）を防ぐための、一時的なスクロール解除
            const originalOverflowY = mainContent ? mainContent.style.overflowY : '';
            if (mainContent) {
                mainContent.style.overflowY = 'visible';
            }

            const opt = {
                margin:       [10, 0, 10, 0],
                filename:     `${fileName}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true,
                    scrollY: 0
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                if (mainContent) mainContent.style.overflowY = originalOverflowY;
            }).catch(err => {
                console.error("PDF生成エラー:", err);
                showModal("PDF出力中にエラーが発生しました。\n隣の「PDF出力 (ブラウザ標準・推奨)」ボタンをお試しください。", false);
                if (mainContent) mainContent.style.overflowY = originalOverflowY;
            });
        }

        function resetApp() {
            showModal("読み込んだデータと設定をすべてリセットして、初期状態に戻しますか？", true, () => {
                
                // 変数の初期化
                rawData = [];
                columns = [];
                questionConfig = {};
                
                // グラフインスタンスの破棄
                if (chartInstances) {
                    Object.values(chartInstances).forEach(chart => {
                        if (chart && typeof chart.destroy === 'function') {
                            chart.destroy();
                        }
                    });
                }
                chartInstances = {};

                // ファイル入力のクリア (同じファイルを再選択できるように)
                const fileInput = document.getElementById('file-input');
                if (fileInput) {
                    fileInput.value = "";
                }
                
                // 設問リストと設定コンテナの初期化
                const questionList = document.getElementById('question-list');
                if (questionList) questionList.innerHTML = "";
                
                const qContainer = document.getElementById('questions-container');
                if (qContainer) qContainer.style.display = "none";
                
                // 表題の初期化
                const today = new Date();
                const inputDate = document.getElementById('input-date');
                if (inputDate) {
                    inputDate.value = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
                }
                
                const inputTitle = document.getElementById('input-title');
                if (inputTitle) inputTitle.value = "アンケート集計結果";
                
                const inputSubtitle = document.getElementById('input-subtitle');
                if (inputSubtitle) inputSubtitle.value = "自動集計レポート";
                
                updateHeader();

                // プレビュー領域の初期化
                const area = document.getElementById('preview-area');
                if (area) {
                    area.innerHTML = `
                        <div class="empty-message">
                            <strong>左側のパネルからExcelファイルをアップロードするか、<br>「サンプルデータで試す」ボタンを押してください。</strong><br><br>
                            ※先頭行が見出し（設問）として読み込まれます。<br>
                            ※データはすべてお使いのブラウザ内でのみ処理されます。
                        </div>
                    `;
                }
                
                // メインコンテンツのスクロール位置を一番上に戻す
                const mainContent = document.getElementById('main-content');
                if (mainContent) {
                    mainContent.scrollTop = 0;
                }
            });
        }
    </script>
